version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: investment_advisor
      POSTGRES_USER: advisor
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U advisor -d investment_advisor"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://advisor:${DB_PASSWORD:-changeme}@db:5432/investment_advisor
    volumes:
      - chromadb_data:/app/chroma_db
      - app_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  chromadb_data:
  app_logs:
